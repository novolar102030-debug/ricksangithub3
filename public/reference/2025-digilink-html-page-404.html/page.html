<!DOCTYPE html><html lang="en"><head>
    <meta charset="utf-8">
    <title>Digilink - Creative Agency Html | FAQ</title>
    <!-- Stylesheets -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
    <link rel="icon" href="images/favicon.png" type="image/x-icon">

    <!-- Responsive -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>

  <body style="">
    <div class="page-wrapper">
      <!-- Preloader -->
      <div id="preloader" class="preloader">
        <div class="animation-preloader">
          <div class="spinner"></div>
          <div class="txt-loading">
            <span data-text-preloader="D" class="letters-loading"> D </span>
            <span data-text-preloader="I" class="letters-loading"> I </span>
            <span data-text-preloader="G" class="letters-loading"> G </span>
            <span data-text-preloader="I" class="letters-loading"> I </span>
            <span data-text-preloader="L" class="letters-loading"> L </span>
            <span data-text-preloader="I" class="letters-loading"> I </span>
            <span data-text-preloader="N" class="letters-loading"> N </span>
            <span data-text-preloader="K" class="letters-loading"> K </span>
          </div>
          <p class="text-center">Loading</p>
        </div>
        <div class="loader">
          <div class="row">
            <div class="col-3 loader-section section-left">
              <div class="bg"></div>
            </div>
            <div class="col-3 loader-section section-left">
              <div class="bg"></div>
            </div>
            <div class="col-3 loader-section section-right">
              <div class="bg"></div>
            </div>
            <div class="col-3 loader-section section-right">
              <div class="bg"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="smooth-wrapper">
        <div id="smooth-content">
          <!-- 404 Section -->
          <section class="">
            <div class="auto-container pt-70 pb-100">
              <div class="row">
                <div class="col-xl-12">
                  <div class="error-page__inner theme-btn-main">
                    <div class="error-page__title-box">
                      <img src="images/resource/404.png" alt="">
                      <h3 class="error-page__sub-title mt-50">Page not found!</h3>
                    </div>
                    <p class="error-page__text">
                      Sorry we can't find that page! The page you are looking <br>
                      for was never existed.
                    </p>
                    <form class="error-page__form" role="search" aria-label="Search Form">
                      <div class="error-page__form-input">
                        <label for="error-search" class="visually-hidden">Search</label>
                        <input type="search" id="error-search" name="s" placeholder="Search here" required="" aria-required="true">
                        <button type="submit" aria-label="Submit Search">
                          <i class="lnr lnr-icon-magnifier" aria-hidden="true"></i>
                        </button>
                      </div>
                    </form>
                    <a href="index.html" class="theme-btn btn-style-one transform"><span class="btn-title">Back to Home</span></a>
                  </div>
                </div>
              </div>
            </div>
          </section>
          <!--End 404 Section -->
        </div>
      </div>
    </div>
    <!-- End Page Wrapper -->
    <div class="scroll-to-top scroll-to-target" data-target="html"><span class="fa fa-angle-up"></span></div>
    <script src="js/jquery.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.fancybox.js"></script>
    <script src="js/jquery-ui.js"></script>
    <script src="js/gsap.js"></script>
    <script src="js/three.js"></script>
    <script src="js/hover-effect.umd.js"></script>
    <script src="js/gsap-scroll-to-plugin.js"></script>
    <script src="js/gsap-scroll-smoother.js"></script>
    <script src="js/gsap-scroll-trigger.js"></script>
    <script src="js/gsap-split-text.js"></script>
    <script src="js/split-type.min.js"></script>
    <script src="js/parallaxie.js"></script>
    <script src="js/jquery.magnific-popup.min.js"></script>
    <script src="js/wow.js"></script>
    <script src="js/bxslider.js"></script>
    <script src="js/nice-select.min.js"></script>
    <script src="js/knob.js"></script>
    <script src="js/appear.js"></script>
    <script src="js/slick.js"></script>
    <script src="js/swiper.min.js"></script>
    <script src="js/mixitup.js"></script>
  

</body></html>
